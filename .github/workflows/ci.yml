name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q

  docker-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [go, c, cpp, rust, zig, haskell, crystal, swiftpm,
               python, node, typescript, deno, ruby, php, perl, lua,
               elixir, jvm, kotlin, scala, dotnet, dart]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.lang }} image
        run: docker build -t ultra-sandbox/${{ matrix.lang }} ultra_sandbox/images/${{ matrix.lang }}
