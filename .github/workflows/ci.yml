name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q
  docker-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [go, cpp, node, python, rust, jvm]
    steps:
      - uses: actions/checkout@v4
      - name: Build toolchain image
        run: docker build -t ultra-sandbox/${{ matrix.lang }} ultra_sandbox/images/${{ matrix.lang }}
